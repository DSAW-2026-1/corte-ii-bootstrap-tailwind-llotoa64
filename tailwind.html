<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Tailwind | Stats preview card component</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#0a0c1b] flex items-center justify-center min-h-screen text-white">

<div class="bg-[#1b1938] rounded-lg overflow-hidden max-w-sm text-center">

  <img src="images/image-header-mobile.jpg" class="w-full">

  <div class="p-6">

    <h2 class="text-xl font-bold">
      Get <span class="text-purple-400">insights</span> that help your business grow.
    </h2>

    <p class="text-gray-400 mt-4">
      Discover the benefits of data analytics and make better decisions regarding revenue, customer 
      experience, and overall efficiency.
    </p>

    <div class="mt-6 space-y-5">

      <div>
        <h3 class="text-xl font-bold">10k+</h3>
        <p class="text-xs tracking-widest text-gray-400">COMPANIES</p>
      </div>

      <div>
        <h3 class="text-xl font-bold">314</h3>
        <p class="text-xs tracking-widest text-gray-400">TEMPLATES</p>
      </div>

      <div>
        <h3 class="text-xl font-bold">12M+</h3>
        <p class="text-xs tracking-widest text-gray-400">QUERIES</p>
      </div>

    </div>

  </div>

</div>

</body>
</html>
