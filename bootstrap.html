<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

<title>Bootstrap | Stats preview card component</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0a0c1b;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card-custom{
background:#1b1938;
border-radius:10px;
overflow:hidden;
max-width:1000px;
}

.highlight{
color:#aa5cdb;
}

.stats span{
font-size:12px;
letter-spacing:2px;
color:#aaa;
}

</style>

</head>

<body>

<div class="card-custom container p-0">

<div class="row g-0 flex-column flex-md-row">

<!-- IMAGEN -->
<div class="col-md-6 order-md-2">
<img src="images/image-header-desktop.jpg" class="img-fluid h-100 w-100">
</div>

<!-- TEXTO -->
<div class="col-md-6 p-5 text-center text-md-start">

<h2>
Get <span class="highlight">insights</span> that help your business grow.
</h2>

<p class="mt-4 text-secondary">
Discover the benefits of data analytics and make better decisions regarding revenue,
customer experience, and overall efficiency.
</p>

<div class="stats mt-5 d-md-flex justify-content-between text-center text-md-start">

<div>
<h3>10k+</h3>
<span>COMPANIES</span>
</div>

<div>
<h3>314</h3>
<span>TEMPLATES</span>
</div>

<div>
<h3>12M+</h3>
<span>QUERIES</span>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
