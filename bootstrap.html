<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Bootstrap | Stats preview card component</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background:#0a0c1b;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card-custom{
      background:#1b1938;
      border-radius:10px;
      overflow:hidden;
      max-width:350px;
      text-align:center;
    }

    .card-custom img{
      width:100%;
    }

    .stats div{
      margin-top:20px;
    }

    .stats span{
      font-size:12px;
      letter-spacing:2px;
      color:#aaa;
    }

    .highlight{
      color:#aa5cdb;
    }

  </style>

</head>
<body>

<div class="card-custom">

  <img src="images/image-header-mobile.jpg" class="img-fluid">

  <div class="p-4">

    <h3>
      Get <span class="highlight">insights</span> that help your business grow.
    </h3>

    <p class="mt-3 text-secondary">
      Discover the benefits of data analytics and make better decisions regarding revenue, customer 
      experience, and overall efficiency.
    </p>

    <div class="stats mt-4">

      <div>
        <h4>10k+</h4>
        <span>COMPANIES</span>
      </div>

      <div>
        <h4>314</h4>
        <span>TEMPLATES</span>
      </div>

      <div>
        <h4>12M+</h4>
        <span>QUERIES</span>
      </div>

    </div>

  </div>

</div>

</body>
</html>
